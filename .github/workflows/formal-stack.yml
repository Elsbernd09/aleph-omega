name: Aleph-Omega Formal Stack

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  formal-stack:
    name: Lean, Lake, and Python Formal Stack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Install Lean through elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain stable
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Sync Lake Lean core
        run: |
          ./scripts/sync_lake_core.sh

      - name: Run full formal stack check
        run: |
          ./scripts/check_formal_stack.sh
